{% extends 'base/layout.html' %}
{% load django_tables2 %}

{% block title %}Import History{% endblock %}

{% block content %}
<div class="row">
  <div class="col">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <strong>Import History</strong>
        <a href="{% url 'plugins:netbox_data_import:import_setup' %}" class="btn btn-sm btn-primary">
          <i class="mdi mdi-database-import"></i> New Import
        </a>
      </div>
      <div class="card-body p-0">
        {% render_table table %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
