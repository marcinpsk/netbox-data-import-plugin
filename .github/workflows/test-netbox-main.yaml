name: Weekly test against NetBox main

# DISABLED: tests not yet implemented for this plugin
# on:
#   schedule:
#     - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  test-netbox-main:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    services:
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: netbox
          POSTGRES_PASSWORD: netbox
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          path: netbox-data-import-plugin

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1  # v8.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Checkout NetBox main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: "netbox-community/netbox"
          path: netbox
          ref: main

      - name: Install NetBox and plugin
        working-directory: netbox-data-import-plugin
        run: |
          uv pip install --system -r ../netbox/requirements.txt
          uv pip install --system pytest pytest-django tblib
          uv pip install --system -e .

      - name: Set up NetBox configuration
        working-directory: netbox
        run: |
          cat > netbox/netbox/configuration.py << 'EOF'
          ALLOWED_HOSTS = ['*']
          DATABASE = {
              'NAME': 'netbox',
              'USER': 'netbox',
              'PASSWORD': 'netbox',
              'HOST': 'localhost',
              'PORT': '5432',
              'CONN_MAX_AGE': 300,
              'ENGINE': 'django.db.backends.postgresql'
          }
          REDIS = {
              'tasks': {'HOST': 'localhost', 'PORT': 6379, 'DATABASE': 0},
              'caching': {'HOST': 'localhost', 'PORT': 6379, 'DATABASE': 1}
          }
          SECRET_KEY = 'test-secret-key-not-for-production-1234567890123456'  # checkov:skip=CKV_SECRET_6: CI-only test fixture
          API_TOKEN_PEPPERS = {0: 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa'}  # checkov:skip=CKV_SECRET_6: CI-only test fixture
          PLUGINS = ['netbox_data_import']
          EOF

      - name: Run tests
        working-directory: netbox/netbox
        env:
          NETBOX_CONFIGURATION: netbox.configuration
        run: |
          python manage.py test netbox_data_import --verbosity=2
