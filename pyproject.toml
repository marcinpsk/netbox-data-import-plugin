[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "netbox-data-import"
version = "0.1.0"
description = "NetBox plugin for importing data from external DCIM systems"
readme = "README.md"
requires-python = ">=3.12.0"
license = "Apache-2.0"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Framework :: Django",
]
dependencies = [
    "openpyxl>=3.1",
]

[tool.setuptools.packages.find]
include = ["netbox_data_import*"]

[dependency-groups]
dev = [
    "build",
    "reuse",
    "ruff",
    "pre-commit",
    "pytest",
    "pytest-django",
    "python-semantic-release",
]
docs = [
    "mkdocs>=1,<2",
    "mkdocs-material>=9,<10",
]

[tool.pytest.ini_options]
pythonpath = ["/opt/netbox/netbox"]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
ignore = ["E501", "F403", "F405"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.semantic_release]
version_toml = ["pyproject.toml:project.version"]
version_variables = ["netbox_data_import/__init__.py:__version__"]
branch = "main"
commit_message = "chore(release): {version}\n\nAutomatically generated by python-semantic-release"
build_command = "python -m build"
upload_to_vcs_release = true

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"

[tool.semantic_release.commit_parser_options]
allowed_tags = ["feat", "fix", "docs", "style", "refactor", "perf", "test", "build", "ci", "chore", "revert"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]
parse_squash_commits = false
